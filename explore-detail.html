<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Destination - TravelTales</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: "Poppins", sans-serif; scroll-behavior: smooth; }
      .nav-link:hover { color: #f97316; }
      .hero-image { height: 50vh; object-fit: cover; }
    </style>
  </head>
  <body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="fixed w-full bg-white/90 backdrop-blur-md z-50 shadow-sm">
      <div class="container mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <a href="index.html" class="text-2xl font-bold text-orange-500">TravelTales</a>
          <div class="hidden md:flex space-x-6">
            <a href="explore.html" class="nav-link">Explore</a>
            <a href="blogs.html" class="nav-link">Blog</a>
            <a href="index.html#plan-trip" class="nav-link">My Trips</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link">Contact</a>
          </div>
        </div>
      </div>
    </nav>
    <main class="pt-24">
      <div class="container mx-auto px-4">
        <div id="exploreDetailContent" class="bg-white rounded-xl shadow-lg overflow-hidden">
            <!-- content dynamically load hoga -->
        </div>
      </div>
    </main>
    <footer class="bg-gray-800 text-white py-12 mt-16">
      <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
          <div>
            <h3 class="text-xl font-bold mb-4">TravelTales</h3>
            <p class="text-gray-400">Share your journey, inspire others.</p>
          </div>
          <div>
            <h4 class="font-bold mb-4">Quick Links</h4>
            <ul class="space-y-2">
              <li><a href="about.html" class="text-gray-400 hover:text-white">About Us</a></li>
              <li><a href="contact.html" class="text-gray-400 hover:text-white">Contact</a></li>
              <li><a href="privacy.html" class="text-gray-400 hover:text-white">Privacy Policy</a></li>
            </ul>
          </div>
          <div>
            <h4 class="font-bold mb-4">Follow Us</h4>
            <div class="flex space-x-4">
              <a href="#" class="text-2xl hover:text-orange-500"><i class="bi bi-facebook"></i></a>
              <a href="#" class="text-2xl hover:text-orange-500"><i class="bi bi-twitter"></i></a>
              <a href="#" class="text-2xl hover:text-orange-500"><i class="bi bi-instagram"></i></a>
            </div>
          </div>
          <div>
            <h4 class="font-bold mb-4">Newsletter</h4>
            <form class="flex flex-col space-y-2">
              <input type="email" placeholder="Your email" class="px-4 py-2 rounded-lg text-gray-800" />
              <button class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-lg transition">Subscribe</button>
            </form>
          </div>
        </div>
      </div>
    </footer>
    <script>
      // Destination data
      const destinations = {
        agra: {
          name: "Agra",
          image: "https://images.unsplash.com/photo-1564507592333-c60657eea523?q=80&w=2942&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
          description: "Home to the iconic Taj Mahal, a symbol of eternal love and architectural brilliance.",
          details: `<p class='text-lg text-gray-700 mb-6'>Agra is a city on the banks of the Yamuna river in the Indian state of Uttar Pradesh. It is famous for the Taj Mahal, one of the Seven Wonders of the World, and a UNESCO World Heritage Site. Agra also boasts other magnificent Mughal-era buildings, including the Agra Fort and Fatehpur Sikri, all of which are UNESCO World Heritage Sites.</p>`
        },
        udaipur: {
          name: "Udaipur",
          image: "https://plus.unsplash.com/premium_photo-1661964079694-ccfaf7dc8028?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8dWRhaXB1cnxlbnwwfHwwfHx8MA%3D%3D",
          description: "The City of Lakes, known for its romantic setting and royal heritage.",
          details: `<p class='text-lg text-gray-700 mb-6'>Udaipur, in Rajasthan, is renowned for its beautiful lakes, palaces, and vibrant culture. The city is often called the 'Venice of the East' and is home to the famous Lake Palace, City Palace, and Jag Mandir. Udaipur's scenic beauty and rich history make it a favorite destination for travelers.</p>`
        },
        rishikesh: {
          name: "Rishikesh",
          image: "https://images.unsplash.com/photo-1720819029162-8500607ae232?q=80&w=3132&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
          description: "The yoga capital offering spiritual experiences and adventure sports.",
          details: `<p class='text-lg text-gray-700 mb-6'>Rishikesh, located in Uttarakhand, is known as the 'Yoga Capital of the World.' It attracts spiritual seekers and adventure lovers alike. The city is famous for its ashrams, the Ganges River, and activities like white-water rafting, trekking, and bungee jumping.</p>`
        }
      };
      function loadExploreDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const destId = urlParams.get('dest');
        const dest = destinations[destId];
        if (dest) {
          document.title = `${dest.name} - Explore | TravelTales`;
          document.getElementById('exploreDetailContent').innerHTML = `
            <img src="${dest.image}" alt="${dest.name}" class="hero-image w-full" />
            <div class="p-8">
              <h1 class="text-4xl font-bold mb-4">${dest.name}</h1>
              <p class="text-orange-600 text-lg mb-4">${dest.description}</p>
              <div class="prose max-w-none mb-8">${dest.details}</div>
              <a href="explore.html" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-lg transition">Back to Explore</a>
            </div>
          `;
        } else {
          document.getElementById('exploreDetailContent').innerHTML = `
            <div class="p-8 text-center">
              <h1 class="text-3xl font-bold mb-4">Destination Not Found</h1>
              <p class="text-gray-600 mb-6">The destination you're looking for doesn't exist.</p>
              <a href="explore.html" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-lg transition">Back to Explore</a>
            </div>
          `;
        }
      }
      document.addEventListener('DOMContentLoaded', loadExploreDetail);
    </script>
  </body>
</html>
